  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
    <div>
      <div style="font-size:18px; font-weight:500; color:var(--color-text-primary);">HS Zone map</div>
      <div style="font-size:13px; color:var(--color-text-secondary); margin-top:2px;">Provinces coloured by zone — hover for details</div>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;" id="branch-filters"></div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 260px; gap:16px; align-items:start;">
    <div id="map-container" style="border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); overflow:hidden; background:var(--color-background-secondary); position:relative;">

    </div>

    <div style="display:flex; flex-direction:column; gap:8px;">

      <div id="stats-panel" style="margin-top:4px;"></div>
    </div>
  </div>
</div>

const byCode = {};
PROVINCES.forEach(p => { byCode[p.code] = p; });

const BRANCHES = [...new Set(PROVINCES.map(p => p.branch))].sort();
const ZONES = [...new Set(PROVINCES.map(p => p.zone))].sort();

const BRANCH_PALETTE = {
  "LMIT-HS-BARI":    { base:"#006AE0", shades:["#cce0fb","#99c1f7","#66a3f3","#3384ee","#006AE0","#0054b3","#003f87"] },
  "LMIT-HS-BOLOGNA": { base:"#08DC7D", shades:["#cef9e7","#9ef3d0","#6dedb9","#3de6a2","#08DC7D","#06b064","#04844b"] },
  "LMIT-HS-MILAN":   { base:"#FFD54F", shades:["#fff8dc","#fff0b3","#ffe98a","#ffe161","#FFD54F","#ccaa3f","#997f2f"] },
  "LMIT-HS-NAPLES":  { base:"#F04438", shades:["#fde8e7","#fbc4c1","#f9a09b","#f77b75","#F04438","#c0362d","#902921"] },
  "LMIT-HS-PADOVA":  { base:"#7C3AED", shades:["#ede9fb","#cfc0f6","#b197f1","#936eec","#7C3AED","#6230bc","#49248d"] },
  "LMIT-HS-PALERMO": { base:"#F97316", shades:["#feeadb","#fcd0b0","#fbb685","#f99c5a","#F97316","#c75c12","#95450d"] },
  "LMIT-HS-ROME":    { base:"#21264E", shades:["#d4d5df","#a8abbe","#7d809e","#51567d","#21264E","#1a1e3e","#13172f"] },
  "LMIT-HS-TORINO":  { base:"#0EA5E9", shades:["#d0edfa","#a1daf6","#72c8f2","#43b5ee","#0EA5E9","#0b84ba","#08638c"] },
};

const BRANCH_LABEL = {
  "LMIT-HS-BARI":    "Bari",
  "LMIT-HS-BOLOGNA": "Bologna",
  "LMIT-HS-MILAN":   "Milan",
  "LMIT-HS-NAPLES":  "Naples",
  "LMIT-HS-PADOVA":  "Padova",
  "LMIT-HS-PALERMO": "Palermo",
  "LMIT-HS-ROME":    "Rome",
  "LMIT-HS-TORINO":  "Torino",
};

function getZoneShade(branch, zone) {
  const pal = BRANCH_PALETTE[branch];
  if (!pal) return "#aaa";
  const zonesForBranch = [...new Set(
    PROVINCES.filter(p => p.branch === branch).map(p => p.zone)
  )].sort();
  const idx = zonesForBranch.indexOf(zone);
  return pal.shades[Math.min(idx + 1, pal.shades.length - 1)];
}

let activeBranch = null;
let hoveredCode = null;

function getColor(code) {
  const p = byCode[code];
  if (!p) return "#e5e7eb";
  if (activeBranch && p.branch !== activeBranch) return "#e5e7eb";
  return getZoneShade(p.branch, p.zone);
}

function getStroke(code) {
  const p = byCode[code];
  if (!p) return "#ccc";
  if (activeBranch && p.branch !== activeBranch) return "#d1d5db";
  return "#fff";
}

let svgEl, pathSelection;

function renderLegend() {
  const container = document.getElementById("legend-container");
  const statsPanel = document.getElementById("stats-panel");
  
  const branchesToShow = activeBranch ? [activeBranch] : BRANCHES;
  
  let html = "";
  branchesToShow.forEach(branch => {
    const pal = BRANCH_PALETTE[branch];
    const zones = [...new Set(PROVINCES.filter(p => p.branch === branch).map(p => p.zone))].sort();
    const count = PROVINCES.filter(p => p.branch === branch).length;
    html += `<div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-md); padding:10px 12px; margin-bottom:8px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
        <div style="width:10px; height:10px; border-radius:2px; background:${pal.base};"></div>
        <span style="font-size:13px; font-weight:500; color:var(--color-text-primary);">${BRANCH_LABEL[branch]}</span>
        <span style="font-size:11px; color:var(--color-text-secondary); margin-left:auto;">${count} prov.</span>
      </div>`;
    zones.forEach((zone, idx) => {
      const zoneCount = PROVINCES.filter(p => p.zone === zone).length;
      const shade = pal.shades[Math.min(idx + 1, pal.shades.length - 1)];
      const shortZone = zone.replace(/^HS /, "").replace(/ ZONE /, " Z");
      html += `<div style="display:flex; align-items:center; gap:6px; margin-top:4px;">
        <div style="width:8px; height:8px; border-radius:1px; background:${shade}; flex-shrink:0;"></div>
        <span style="font-size:11px; color:var(--color-text-secondary); flex:1;">${shortZone}</span>
        <span style="font-size:11px; color:var(--color-text-tertiary);">${zoneCount}</span>
      </div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;

  const totalProv = activeBranch ? PROVINCES.filter(p => p.branch === activeBranch).length : PROVINCES.length;
  const totalZones = activeBranch 
    ? [...new Set(PROVINCES.filter(p => p.branch === activeBranch).map(p => p.zone))].length 
    : ZONES.length;
  statsPanel.innerHTML = `
    <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 12px;">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:4px;">Coverage summary</div>
      <div style="display:flex; justify-content:space-between; margin-bottom:2px;">
        <span style="font-size:12px; color:var(--color-text-secondary);">Provinces</span>
        <span style="font-size:12px; font-weight:500; color:var(--color-text-primary);">${totalProv}</span>
      </div>
      <div style="display:flex; justify-content:space-between; margin-bottom:2px;">
        <span style="font-size:12px; color:var(--color-text-secondary);">Zones</span>
        <span style="font-size:12px; font-weight:500; color:var(--color-text-primary);">${totalZones}</span>
      </div>
      <div style="display:flex; justify-content:space-between;">
        <span style="font-size:12px; color:var(--color-text-secondary);">Branches</span>
        <span style="font-size:12px; font-weight:500; color:var(--color-text-primary);">${activeBranch ? 1 : BRANCHES.length}</span>
      </div>
    </div>`;
}

function renderFilters() {
  const container = document.getElementById("branch-filters");
  let html = `<button onclick="setFilter(null)" style="font-size:11px; padding:4px 10px; border-radius:99px; border:0.5px solid var(--color-border-${activeBranch === null ? 'primary' : 'tertiary'}); background:${activeBranch === null ? 'var(--color-background-secondary)' : 'transparent'}; color:var(--color-text-${activeBranch === null ? 'primary' : 'secondary'}); cursor:pointer;">All</button>`;
  BRANCHES.forEach(b => {
    const pal = BRANCH_PALETTE[b];
    const isActive = activeBranch === b;
    html += `<button onclick="setFilter('${b}')" style="font-size:11px; padding:4px 10px; border-radius:99px; border:0.5px solid ${isActive ? pal.base : 'var(--color-border-tertiary)'}; background:${isActive ? pal.base + '22' : 'transparent'}; color:${isActive ? pal.base : 'var(--color-text-secondary)'}; cursor:pointer;">${BRANCH_LABEL[b]}</button>`;
  });
  container.innerHTML = html;
}

function setFilter(branch) {
  activeBranch = branch;
  renderFilters();
  renderLegend();
  if (pathSelection) {
    pathSelection.attr("fill", d => getColor(d.properties.prov_acr)).attr("stroke", d => getStroke(d.properties.prov_acr));
  }
}

window.setFilter = setFilter;

renderFilters();
renderLegend();

d3.json("https://cdn.jsdelivr.net/gh/openpolis/geojson-italy@master/topojson/limits_IT_provinces.topo.json").then(topo => {
  const features = topojson.feature(topo, topo.objects.provinces).features;
  const isDark = matchMedia("(prefers-color-scheme: dark)").matches;
  
  const container = document.getElementById("map");
  const width = container.offsetWidth || 500;
  const height = width * 1.35;

  const svg = d3.select("#map").append("svg")
    .attr("viewBox", `0 0 ${width} ${height}`)
    .attr("width", "100%")
    .style("display","block");

  svgEl = svg;

  const projection = d3.geoMercator().fitSize([width, height], topojson.feature(topo, topo.objects.provinces));
  const path = d3.geoPath(projection);
  const tooltip = document.getElementById("tooltip");
  const mapContainer = document.getElementById("map-container");

  pathSelection = svg.selectAll("path")
    .data(features)
    .join("path")
    .attr("d", path)
    .attr("fill", d => getColor(d.properties.prov_acr))
    .attr("stroke", d => getStroke(d.properties.prov_acr))
    .attr("stroke-width", 0.5)
    .style("cursor", "pointer")
    .style("transition", "opacity 0.15s")
    .on("mouseover", function(event, d) {
      const code = d.properties.prov_acr;
      const p = byCode[code];
      d3.select(this).attr("stroke-width", 1.5).attr("opacity", 0.85);
      if (p) {
        tooltip.innerHTML = `
          <div style="font-weight:500; font-size:13px; color:var(--color-text-primary); margin-bottom:2px;">${p.name} (${code})</div>
          <div style="font-size:11px; color:var(--color-text-secondary);">${p.zone}</div>
          <div style="font-size:11px; color:var(--color-text-secondary);">${BRANCH_LABEL[p.branch]}</div>`;
        tooltip.style.display = "block";
      }
    })
    .on("mousemove", function(event) {
      const rect = mapContainer.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      tooltip.style.left = (x + 12) + "px";
      tooltip.style.top = (y - 10) + "px";
    })
    .on("mouseleave", function() {
      d3.select(this).attr("stroke-width", 0.5).attr("opacity", 1);
      tooltip.style.display = "none";
    })
    .on("click", function(event, d) {
      const code = d.properties.prov_acr;
      const p = byCode[code];
      if (p) setFilter(activeBranch === p.branch ? null : p.branch);
    });

}).catch(err => {
  document.getElementById("map").innerHTML = `<div style="padding:2rem; color:var(--color-text-secondary); font-size:13px;">Failed to load map topology. Check network access.</div>`;
  console.error(err);
});
</script>
